[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: marks tests that require database (deselect with '-m "not integration"')
    unit: marks pure unit tests without external dependencies
    golden: marks golden regression tests that must always pass
    router_smoke: 路由层冒烟测试（每路由 1-2 个代表性 GET/POST，<30秒），用于日常 dev 快速发现 router 层 NameError/ImportError
addopts = -v --tb=short
norecursedirs = .git __pycache__ .venv .hypothesis
filterwarnings =
    ignore::DeprecationWarning