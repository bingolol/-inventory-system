[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: marks tests that require database (deselect with '-m "not integration"')
    unit: marks pure unit tests without external dependencies
    golden: marks golden regression tests that must always pass
addopts = -v --tb=short
norecursedirs = .git __pycache__ .venv
filterwarnings =
    ignore::DeprecationWarning