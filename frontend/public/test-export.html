<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>批量导出测试</title>
<style>
body { font-family: sans-serif; padding: 20px; }
button { padding: 10px 20px; margin: 5px; cursor: pointer; }
#log { background: #f5f5f5; padding: 10px; margin-top: 20px; white-space: pre-wrap; min-height: 200px; font-family: monospace; }
</style>
</head>
<body>
<h2>库存商品批量导出测试</h2>
<p>确保 localStorage 中有 currentAccountId（默认为1）</p>
<button id="btn1">测试 exportProductsBatch (excel)</button>
<button id="btn2">测试 exportProductsBatch (csv)</button>
<button id="btn3">查看 localStorage</button>
<div id="log"></div>

<script type="module">
// 直接复制 frontend/src/api/index.js 的核心逻辑
import axios from 'https://esm.sh/axios'

const log = document.getElementById('log')
function append(msg) { log.textContent += new Date().toLocaleTimeString() + ' - ' + msg + '\n' }

const api = axios.create({
  baseURL: '/api',
  timeout: 10000
})

api.interceptors.request.use(config => {
  let accountId = localStorage.getItem('currentAccountId')
  if (!accountId) {
    accountId = '1'
    localStorage.setItem('currentAccountId', accountId)
    append('设置默认 accountId = 1')
  }
  config.headers['X-Account-ID'] = accountId
  append('请求头 X-Account-ID: ' + accountId)
  return config
})

api.interceptors.response.use(
  res => {
    append('响应状态: ' + res.status)
    append('响应 Content-Type: ' + res.headers['content-type'])
    if (res.config.responseType === 'blob') {
      append('blob 响应，res.data 类型: ' + (res.data instanceof Blob ? 'Blob ✓' : typeof res.data))
      append('blob 大小: ' + (res.data.size || 'unknown'))
      return res
    }
    return res.data
  },
  err => {
    append('请求错误: ' + (err.response?.status || 'network') + ' - ' + JSON.stringify(err.response?.data || err.message))
    return Promise.reject(err)
  }
)

const exportProductsBatch = async (productIds, format = 'excel') => {
  append('=== 调用 exportProductsBatch ===')
  const res = await api.get('/export/products-batch', {
    params: { product_ids: productIds.join(','), format },
    responseType: 'blob'
  })
  const blob = res.data
  append('原始 blob 类型: ' + blob.constructor.name)
  append('原始 blob size: ' + blob.size)

  // 这里的关键：new Blob([blob], {type}) 会不会导致问题？
  const ext = format === 'csv' ? 'csv' : 'xlsx'
  const mime = format === 'csv'
    ? 'text/csv'
    : 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
  const url = window.URL.createObjectURL(new Blob([blob], { type: mime }))
  append('创建 object URL: ' + url.substring(0, 50) + '...')
  const link = document.createElement('a')
  link.href = url
  link.setAttribute('download', `库存商品导出_${productIds.length}条.${ext}`)
  document.body.appendChild(link)
  link.click()
  document.body.removeChild(link)
  window.URL.revokeObjectURL(url)
  return true
}

document.getElementById('btn1').onclick = async () => {
  try {
    append('========== 测试 Excel 导出 ==========')
    await exportProductsBatch([1], 'excel')
    append('✅ 导出完成')
  } catch (e) {
    append('❌ 导出失败: ' + e.message)
  }
}

document.getElementById('btn2').onclick = async () => {
  try {
    append('========== 测试 CSV 导出 ==========')
    await exportProductsBatch([1], 'csv')
    append('✅ 导出完成')
  } catch (e) {
    append('❌ 导出失败: ' + e.message)
  }
}

document.getElementById('btn3').onclick = () => {
  const val = localStorage.getItem('currentAccountId')
  append('currentAccountId: ' + (val || '(未设置)'))
}
</script>
</body>
</html>
